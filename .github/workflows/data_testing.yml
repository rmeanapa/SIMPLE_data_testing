name: Run & Display SIMPLE Data Sets

on:
  push: {}
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_self_hosted:
    name: Build on self-hosted runner
    runs-on: [self-hosted, linux]
    timeout-minutes: 1440

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          which simple_exec
          ./betagal.sh
          ./apof.sh
          ./proteasome.sh
          ./make_report.sh betagal apof proteasome

      - name: Prepare report for Pages
        run: |
          mkdir -p build
          cp report.html build/report.html
          cp report.html build/index.html

      - name: Upload downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-data-sets-report
          path: build/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build

  deploy_pages:
    name: Deploy report to GitHub Pages
    needs: build_self_hosted
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
