# Template for Test interface
# Requires to install https://github.com/apps/artifact-ci
name: Build SIMPLE & Run Data Sets (Linux/MacOS)

on: [push]

jobs:

  build_self_hosted:
    name: Build on self-hosted runner
    runs-on: [self-hosted, linux]
    timeout-minutes: 1440  # Increases the individual job limit to 24 hours
    steps:
      - uses: actions/checkout@v4

      - name: Print Current Directory
        run: |
          echo "The current absolute path is:"
          pwd
          echo "The GitHub workspace environment variable is:"
          echo $GITHUB_WORKSPACE
          ls

      - name: Run tests 
        #working-directory: apof
        run: |
             which simple_exec
             ./apof.sh 

      - name: Download test image 
        run: mkdir -p build && wget -P build https://www.dartmouth.edu/emlab/images/hibim4.jpg 

      - name: Create html artifact 
        run: echo "<html><body><h1>SIMPLE Test Report</h1><p>Test Passed</p> <img src="hibim4.jpg" alt="Embedded Base64 image" width="100" height="100"> </body></html>" > build/artifact.html 

      - uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: build/ 
