# Template for Test interface
# Requires to install https://github.com/apps/artifact-ci
name: Data_test_interface
on: [push]
jobs:
 build:
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4
     - run: mkdir -p build && wget -P build https://www.dartmouth.edu/emlab/images/hibim4.jpg 
     - run: echo "<html><body><h1>SIMPLE Test Report</h1><p>Test Passed</p> <img src="hibim4.jpg" alt="Embedded Base64 image" width="100" height="100"> </body></html>" > build/artifact.html 
     - uses: actions/upload-artifact@v4
       with:
         name: my-artifact
         path: build/ 
