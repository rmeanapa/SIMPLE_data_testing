name: Run & Display SIMPLE Data Sets

on:
  push: {}
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_self_hosted:
    name: Build on self-hosted runner
    runs-on: [self-hosted, linux]
    timeout-minutes: 1440

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          export SIMPLE_EMAIL="my.name@uni.edu"
          export SIMPLE_QSYS="local"
          export SIMPLE_PATH=/home/meanapanedar2/programming/SIMPLE/build
          export PATH=${SIMPLE_PATH}/scripts:${SIMPLE_PATH}/bin:${PATH}
          which simple_exec
          echo $SIMPLE_PATH
          ./betagal.sh
          ./apof.sh
          #./proteasome.sh
          #./nanox.sh

      - name: Prepare report for Pages
        run: |
          systems=(betagal apof proteasome nanox)
          mkdir -p build/reports

          for system in "${systems[@]}"; do
            ./make_report.sh "$system"
            cp "report_${system}.html" "build/reports/report_${system}.html"
          done

          generated_at="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          cat > build/index.html <<HTML
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>SIMPLE data testing reports</title>
            <style>
              body {
                color: #111827;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                line-height: 1.5;
                margin: 0;
                padding: 2rem;
              }
              main {
                margin: 0 auto;
                max-width: 760px;
              }
              h1 {
                font-size: 2rem;
                margin-bottom: 0.25rem;
              }
              .timestamp {
                color: #4b5563;
                margin-bottom: 2rem;
              }
              ul {
                list-style: none;
                padding: 0;
              }
              li + li {
                border-top: 1px solid #e5e7eb;
              }
              a {
                color: #0f766e;
                display: block;
                font-size: 1.1rem;
                font-weight: 650;
                padding: 0.75rem 0;
                text-decoration: none;
              }
              a:hover {
                text-decoration: underline;
              }
            </style>
          </head>
          <body>
            <main>
              <h1>SIMPLE data testing reports</h1>
              <p class="timestamp">Generated ${generated_at}</p>
              <ul>
          HTML

          for system in "${systems[@]}"; do
            printf '        <li><a href="reports/report_%s.html">%s</a></li>\n' "$system" "$system" >> build/index.html
          done

          cat >> build/index.html <<'HTML'
              </ul>
            </main>
          </body>
          </html>
          HTML

      - name: Upload downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-data-sets-report
          path: build/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build

  deploy_pages:
    name: Deploy report to GitHub Pages
    needs: build_self_hosted
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
