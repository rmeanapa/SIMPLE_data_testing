# Template for Test interface
# Requires to install https://github.com/apps/artifact-ci
name: Build SIMPLE & Run Data Sets (Linux/MacOS)

on: [push]

jobs:

  build_self_hosted:
    name: Build on self-hosted runner
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Print Current Directory
        run: |
          echo "The current absolute path is:"
          pwd
          echo "The GitHub workspace environment variable is:"
          echo $GITHUB_WORKSPACE
          ls

      - name: Run tests 
        working-directory: workspace
        run: |
             git lfs pull
             filetab_movs.pl /betagal/movies
             simple_exec prg=new_project projname=betagal
             cd betagal
             simple_exec prg=import_movies kv=200 cs=1.4 smpd=0.885 fraca=0.1 nparts=4 nthr=32 filetab=../movies.txt projfile=betagal.simple
             simple_exec prg=new_project projname=apof


  Build:
    name: Build SIMPLE
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [24]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with: 
          lsf: true

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
             sudo apt-get update
             echo "Install Basic Dependencies"
             sudo apt-get -y install gcc cmake lzma-dev libtiff-dev libwebp-dev libfftw3-dev libjpeg-dev gnuplot sqlite3 nvidia-cuda-toolkit nvidia-cuda-toolkit-gcc openmpi-bin openmpi-doc libopenmpi-dev libcurl4-openssl-dev

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
             /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
             echo >> /Users/runner/.bash_profile
             echo 'eval "$(/opt/homebrew/bin/brew shellenv)"' >> /Users/runner/.bash_profile
             eval "$(/opt/homebrew/bin/brew shellenv)"
             brew install jbigkit
             brew install python@3.10
             brew install fftw
             brew install curl

      - name: Clone SIMPLE
        run: |
          git clone https://github.com/hael/SIMPLE.git
          test -d SIMPLE/.git

      - name: Build SIMPLE GUI
        working-directory: SIMPLE
        run: ./compile_clean.sh

      - name: Run tests 
        working-directory: workspace
        run: |
             git lfs pull
             export SIMPLE_EMAIL="my.name@uni.edu"
             export SIMPLE_QSYS="local"
             export SIMPLE_PATH=$GITHUB_WORKSPACE/SIMPLE/build
             export PATH=${SIMPLE_PATH}/scripts:${SIMPLE_PATH}/bin:${PATH}
             filetab_movs.pl $GITHUB_WORKSPACE/betagal/movies
             simple_exec prg=new_project projname=betagal
             cd betagal
             simple_exec prg=import_movies kv=200 cs=1.4 smpd=0.885 fraca=0.1 nparts=4 nthr=32 filetab=../movies.txt projfile=betagal.simple
             simple_exec prg=new_project projname=apof

      - name: Download test image 
        run: mkdir -p build && wget -P build https://www.dartmouth.edu/emlab/images/hibim4.jpg 

      - name: Create html artifact 
        run: echo "<html><body><h1>SIMPLE Test Report</h1><p>Test Passed</p> <img src="hibim4.jpg" alt="Embedded Base64 image" width="100" height="100"> </body></html>" > build/artifact.html 

      - uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: build/ 
